name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        install_sdk: ["9.0.304", "10.0.100"]
    env:
      PACKAGE_VERSION: 0.0.0-ci.${{ github.run_number }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.0.x
            10.0.x
      - name: Restore
        run: dotnet restore
      - name: Build
        run: dotnet build -c Release --nologo
      - name: Test
        run: dotnet test -c Release --nologo
      - name: Pack (dry run)
        run: |
          dotnet pack -c Release -o ./nupkg src/ProfileTool/ProfileTool.csproj -p:Version="$PACKAGE_VERSION"
          dotnet pack -c Release -o ./nupkg src/ProfilerCore/Asynkron.Profiler.Core.csproj -p:Version="$PACKAGE_VERSION"
          test -f "./nupkg/asynkron-profiler.$PACKAGE_VERSION.nupkg"
          test -f "./nupkg/Asynkron.Profiler.Core.$PACKAGE_VERSION.nupkg"
      - name: Install packed tool on SDK ${{ matrix.install_sdk }}
        run: |
          tmpdir="$(mktemp -d)"
          toolpath="$(mktemp -d)"
          cat > "$tmpdir/global.json" <<JSON
          {
            "sdk": {
              "version": "${{ matrix.install_sdk }}",
              "rollForward": "disable"
            }
          }
          JSON
          cp "./nupkg/asynkron-profiler.$PACKAGE_VERSION.nupkg" "$tmpdir/"
          cd "$tmpdir"
          dotnet --version
          dotnet tool install --tool-path "$toolpath" asynkron-profiler --add-source "$PWD" --version "$PACKAGE_VERSION"
          "$toolpath/asynkron-profiler" --help
